<div class="clinic-page">
  <div class="card shadow-sm p-4">

    <h3 class="text-primary mb-3">Create Clinic</h3>

    <form [formGroup]="clinicForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label class="form-label">Doctor</label>
        <input class="form-control" formControlName="doctorName" />
      </div>

      <div class="mb-3">
        <label class="form-label">Clinic Name</label>
        <input class="form-control" formControlName="clinicName" />
        <div class="text-danger" *ngIf="clinicName?.touched && clinicName?.invalid">
          Clinic Name is required (min 2 characters).
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Location</label>
        <input class="form-control" formControlName="location" />
        <div class="text-danger" *ngIf="location?.touched && location?.invalid">
          Location is required.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Contact Number</label>
        <input class="form-control" formControlName="contactNumber" />
        <div class="text-danger" *ngIf="contactNumber?.touched && contactNumber?.invalid">
          Contact Number must be 10 digits.
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Established Year</label>
        <input type="number" class="form-control" formControlName="establishedYear" />
        <div class="text-danger" *ngIf="establishedYear?.touched && establishedYear?.invalid">
          Established Year must be between 1900 and {{ currentYear }}.
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-primary" type="submit">Create Clinic</button>
        <button class="btn btn-secondary" type="button" (click)="resetForm()">Reset</button>
      </div>

      <div class="alert alert-danger mt-3" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

    </form>
  </div>
</div>

<!-- ✅ SUCCESS POPUP -->
<div class="popup-overlay" *ngIf="showSuccessPopup">
  <div class="popup-box">
    <h4>✅ Clinic Created Successfully</h4>
    <button class="btn btn-success mt-2" (click)="closePopup()">OK</button>
  </div>
</div>

<div class="d-flex justify-content-center align-items-center min-vh-100 bg-light">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 720px;">

    <h3 class="text-center mb-4 text-primary">User Registration</h3>

    <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" class="form-control" formControlName="username">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password">
      </div>

      <!-- Role -->
      <div class="mb-3">
        <label class="form-label">Role</label>
        <select class="form-select" formControlName="role" (change)="onRoleChange($event)">
          <option value="">Select Role</option>
          <option value="DOCTOR">DOCTOR</option>
          <option value="PATIENT">PATIENT</option>
        </select>
      </div>

      <!-- Full Name -->
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" formControlName="fullName">
      </div>

      <!-- Contact -->
      <div class="mb-3">
        <label class="form-label">Contact Number</label>
        <input type="text" class="form-control" formControlName="contactNumber">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" formControlName="email">
      </div>

      <!-- Doctor -->
      <div *ngIf="selectedRole === 'DOCTOR'">
        <div class="mb-3">
          <label class="form-label">Specialty</label>
          <input type="text" class="form-control" formControlName="specialty">
        </div>

        <div class="mb-3">
          <label class="form-label">Years of Experience</label>
          <input type="number" class="form-control" formControlName="yearsOfExperience">
        </div>
      </div>

      <!-- Patient -->
      <div *ngIf="selectedRole === 'PATIENT'">
        <div class="mb-3">
          <label class="form-label">Date of Birth</label>
          <input type="date" class="form-control" formControlName="dateOfBirth">
        </div>

        <div class="mb-3">
          <label class="form-label">Address</label>
          <input type="text" class="form-control" formControlName="address">
        </div>
      </div>

      <!-- Buttons -->
      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-primary" type="submit">Register</button>
        <button class="btn btn-secondary" type="button" (click)="resetForm()">Reset</button>
      </div>

      <div class="text-danger mt-3" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

    </form>
  </div>
</div>

<!-- ✅ SUCCESS POPUP -->
<div class="popup-overlay" *ngIf="showSuccessPopup">
  <div class="popup-box">
    <div class="check-icon">✔</div>
    <h4>Registration Successful</h4>
    <p>Your account has been created successfully.</p>

    <div class="popup-actions">
      <button class="btn btn-primary" (click)="goToLogin()">Go to Login</button>
      <button class="btn btn-outline-secondary" (click)="closePopup()">Close</button>
    </div>
  </div>
</div>
